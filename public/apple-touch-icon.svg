<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" fill="#0d1b3e" rx="36"/>

  <!-- Outer blue diamond layers -->
  <polygon points="90,8 172,90 90,172 8,90" fill="#0D47A1"/>
  <polygon points="90,14 166,90 90,166 14,90" fill="#1565C0"/>
  <polygon points="90,20 160,90 90,160 20,90" fill="#1976D2"/>
  <polygon points="90,26 154,90 90,154 26,90" fill="#1E88E5"/>
  <polygon points="90,32 148,90 90,148 32,90" fill="#42A5F5"/>
  <polygon points="90,38 142,90 90,142 38,90" fill="#64B5F6"/>

  <!-- Inner white diamond -->
  <polygon points="90,50 130,90 90,130 50,90" fill="white" opacity="0.97"/>

  <!-- Clock face inside inner diamond (circle clipped to fit) -->
  <clipPath id="diamondClip">
    <polygon points="90,52 128,90 90,128 52,90"/>
  </clipPath>
  <circle cx="90" cy="90" r="34" fill="#E3F2FD" clip-path="url(#diamondClip)"/>
  <circle cx="90" cy="90" r="34" fill="none" stroke="#1565C0" stroke-width="3" clip-path="url(#diamondClip)"/>

  <!-- Clock hour marks -->
  <g stroke="#1565C0" stroke-width="2" stroke-linecap="round" clip-path="url(#diamondClip)">
    <line x1="90" y1="60" x2="90" y2="65"/>
    <line x1="90" y1="115" x2="90" y2="120"/>
    <line x1="60" y1="90" x2="65" y2="90"/>
    <line x1="115" y1="90" x2="120" y2="90"/>
  </g>

  <!-- Clock hands -->
  <!-- Hour hand (pointing to ~10) -->
  <line x1="90" y1="90" x2="75" y2="76" stroke="#0D47A1" stroke-width="3.5" stroke-linecap="round" clip-path="url(#diamondClip)"/>
  <!-- Minute hand (pointing to ~12) -->
  <line x1="90" y1="90" x2="90" y2="64" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" clip-path="url(#diamondClip)"/>
  <!-- Center dot -->
  <circle cx="90" cy="90" r="3" fill="#0D47A1" clip-path="url(#diamondClip)"/>

  <!-- Top highlight on diamond -->
  <polygon points="90,38 142,90 90,64" fill="white" opacity="0.15"/>
</svg>
